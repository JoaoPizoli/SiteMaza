services:
  postgres:
    image: postgres:16-alpine
    container_name: maza-lojas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - maza_site:/var/lib/postgresql/data

volumes:
  maza_site:
